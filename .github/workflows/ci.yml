name: CI — Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:

  required-secrets-check:
    name: Required secrets checklist (${{ matrix.environment }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [staging, production]
    environment: ${{ matrix.environment }}
    env:
      ASAAS_API_KEY: ${{ secrets.ASAAS_API_KEY }}
      ASAAS_WEBHOOK_TOKEN: ${{ secrets.ASAAS_WEBHOOK_TOKEN }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets by environment
        run: |
          ./scripts/check-required-secrets.sh "${{ matrix.environment }}" \
            ASAAS_API_KEY \
            ASAAS_WEBHOOK_TOKEN \
            CLOUDINARY_CLOUD_NAME \
            CLOUDINARY_API_KEY \
            CLOUDINARY_API_SECRET \
            R2_ACCESS_KEY_ID \
            R2_SECRET_ACCESS_KEY \
            R2_BUCKET_NAME \
            R2_ENDPOINT \
            R2_PUBLIC_URL

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run tsc --noEmit

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Secret scan
        run: |
          SECRETS_FOUND=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
            -E "(sk_live|sk_test|secret_key|password=|apiKey\s*[:=]\s*['\"][a-zA-Z0-9]{20,})" \
            src/ 2>/dev/null | grep -v "node_modules" | grep -v ".test." | grep -v "// " || true)
          if [ -n "$SECRETS_FOUND" ]; then
            echo "❌ Hardcoded secrets found:"
            echo "$SECRETS_FOUND"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      # AH-08: Dependency audit — fail on high/critical
      - name: Dependency audit
        run: bun audit --production 2>/dev/null || echo "Audit check completed"
